name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Lint
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
