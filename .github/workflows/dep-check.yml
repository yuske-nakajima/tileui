name: Dependency Check

on:
  schedule:
    # жҜҺж—Ҙ 9:00 JST (0:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  dep-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: npm ci

      # Node.js EOL гғҒгӮ§гғғгӮҜ
      - name: Check Node.js EOL
        id: node-eol
        run: |
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          NODE_CURRENT=$(node -v | sed 's/v//')
          EOL_DATA=$(curl -sf "https://endoflife.date/api/nodejs/${NODE_MAJOR}.json")
          EOL_DATE=$(echo "$EOL_DATA" | jq -r '.eol')
          LATEST=$(echo "$EOL_DATA" | jq -r '.latest')
          LTS=$(echo "$EOL_DATA" | jq -r '.lts')

          # EOL гҒҫгҒ§ 90 ж—Ҙд»ҘеҶ…гҒӢгғҒгӮ§гғғгӮҜ
          TODAY=$(date +%s)
          EOL_TS=$(date -d "$EOL_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$EOL_DATE" +%s 2>/dev/null || echo "0")
          DAYS_LEFT=$(( (EOL_TS - TODAY) / 86400 ))

          REPORT=""
          if [ "$DAYS_LEFT" -lt 90 ] && [ "$DAYS_LEFT" -gt 0 ]; then
            REPORT="вҡ пёҸ Node.js ${NODE_MAJOR} гҒ® EOL гҒҫгҒ§ж®ӢгӮҠ ${DAYS_LEFT} ж—Ҙ (${EOL_DATE})"
          elif [ "$DAYS_LEFT" -le 0 ]; then
            REPORT="рҹҡЁ Node.js ${NODE_MAJOR} гҒҜ EOL гӮ’йҒҺгҒҺгҒҰгҒ„гҒҫгҒҷ (${EOL_DATE})"
          fi

          if [ "$NODE_CURRENT" != "$LATEST" ]; then
            REPORT="${REPORT}\nрҹ“Ұ Node.js гӮўгғғгғ—гғҮгғјгғҲ: v${NODE_CURRENT} вҶ’ v${LATEST}"
          fi

          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # npm-check-updates гҒ§гӮўгғғгғ—гғҮгғјгғҲгғҒгӮ§гғғгӮҜ
      - name: Check patch updates
        id: patch
        run: |
          RESULT=$(npx -y npm-check-updates --target patch 2>/dev/null || true)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check minor updates
        id: minor
        run: |
          RESULT=$(npx -y npm-check-updates --target minor 2>/dev/null || true)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check major updates
        id: major
        run: |
          RESULT=$(npx -y npm-check-updates --target latest 2>/dev/null || true)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # npm audit
      - name: Check vulnerabilities
        id: audit
        run: |
          RESULT=$(npm audit 2>&1 || true)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # гғ¬гғқгғјгғҲз”ҹжҲҗ & Issue дҪңжҲҗ
      - name: Create issue if updates found
        uses: actions/github-script@v7
        env:
          NODE_EOL: ${{ steps.node-eol.outputs.report }}
          PATCH: ${{ steps.patch.outputs.result }}
          MINOR: ${{ steps.minor.outputs.result }}
          MAJOR: ${{ steps.major.outputs.result }}
          AUDIT: ${{ steps.audit.outputs.result }}
        with:
          script: |
            const nodeEol = process.env.NODE_EOL?.trim() || '';
            const patch = process.env.PATCH || '';
            const minor = process.env.MINOR || '';
            const major = process.env.MAJOR || '';
            const audit = process.env.AUDIT || '';

            const allLatest = [patch, minor, major].every(r =>
              r.includes('All dependencies match')
            );
            const noVulnerabilities = audit.includes('found 0 vulnerabilities');
            const noNodeIssue = nodeEol === '';

            if (allLatest && noVulnerabilities && noNodeIssue) {
              console.log('е…ЁгҒҰжңҖж–°гғ»е•ҸйЎҢгҒӘгҒ—гҖӮIssue гҒҜдҪңжҲҗгҒ—гҒҫгҒӣгӮ“гҖӮ');
              return;
            }

            const today = new Date().toISOString().split('T')[0];
            const title = `рҹ“Ұ дҫқеӯҳжҖ§гғҒгӮ§гғғгӮҜгғ¬гғқгғјгғҲ (${today})`;

            let body = `# дҫқеӯҳжҖ§гғҒгӮ§гғғгӮҜгғ¬гғқгғјгғҲ\n\n`;
            body += `**е®ҹиЎҢж—Ҙ**: ${today}\n`;
            body += `**Node.js**: ${process.version}\n\n`;

            if (nodeEol) {
              body += `## Node.js гӮ№гғҶгғјгӮҝгӮ№\n\n${nodeEol}\n\n`;
            }

            body += `## гғ‘гғғгғҒгӮўгғғгғ—гғҮгғјгғҲ\n\n\`\`\`\n${patch}\n\`\`\`\n\n`;
            body += `## гғһгӮӨгғҠгғјгӮўгғғгғ—гғҮгғјгғҲ\n\n\`\`\`\n${minor}\n\`\`\`\n\n`;
            body += `## гғЎгӮёгғЈгғјгӮўгғғгғ—гғҮгғјгғҲ\n\n\`\`\`\n${major}\n\`\`\`\n\n`;
            body += `## гӮ»гӮӯгғҘгғӘгғҶгӮЈзӣЈжҹ»\n\n\`\`\`\n${audit}\n\`\`\`\n\n`;
            body += `---\nрҹӨ– GitHub Actions гҒ«гӮҲгӮҠиҮӘеӢ•з”ҹжҲҗ`;

            // еҗҢж—ҘгҒ®ж—ўеӯҳ Issue гӮ’й–үгҒҳгӮӢ
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies',
            });

            for (const issue of existingIssues) {
              if (issue.title.startsWith('рҹ“Ұ дҫқеӯҳжҖ§гғҒгӮ§гғғгӮҜгғ¬гғқгғјгғҲ')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['dependencies'],
            });
